  <title>PilotPOS — Restaurant Operating System</title>

  <script>
    // Defensively redefine window.fetch to be writable so that external tracking scripts,
    // browser extensions, or proxy tools attempting to patch it don't throw a fatal TypeError.
    (function () {
      try {
        var nativeFetch = window.fetch;
        var currentFetch = nativeFetch;
        Object.defineProperty(window, 'fetch', {
          get: function () {
            return currentFetch;
          },
          set: function (newFetch) {
            currentFetch = newFetch;
          },
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        console.warn('[Fetch Patch] Failed to make window.fetch writable:', e);
      }
    })();
  </script>
