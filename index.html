<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restflow App</title>
  <script>
    // Defensively redefine window.fetch to be writable so that external tracking scripts,
    // browser extensions, or proxy tools attempting to patch it don't throw a fatal TypeError.
    (function () {
      try {
        var nativeFetch = window.fetch;
        var currentFetch = nativeFetch;
        Object.defineProperty(window, 'fetch', {
          get: function () {
            return currentFetch;
          },
          set: function (newFetch) {
            currentFetch = newFetch;
          },
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        console.warn('[Fetch Patch] Failed to make window.fetch writable:', e);
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
