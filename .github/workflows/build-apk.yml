name: Build & Publish Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Bisa juga trigger manual dari tab Actions

permissions:
  contents: write

jobs:
  build-and-publish:
    name: Build APK & Publish Release
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: flutter_kasir

    steps:
      # ──────────────────────────────────────────────
      # 1. Checkout
      # ──────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ──────────────────────────────────────────────
      # 2. Setup Java 17 (dibutuhkan Gradle 9.x)
      # ──────────────────────────────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ──────────────────────────────────────────────
      # 3. Setup Flutter
      # ──────────────────────────────────────────────
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: 'stable'
          cache: true

      # ──────────────────────────────────────────────
      # 4. Verifikasi environment
      # ──────────────────────────────────────────────
      - name: 🔍 Verifikasi Flutter & Dart
        run: |
          flutter --version
          dart --version

      # ──────────────────────────────────────────────
      # 5. Install dependencies
      # ──────────────────────────────────────────────
      - name: 📦 Install dependencies
        run: flutter pub get

      # ──────────────────────────────────────────────
      # 6. Build Release APK
      # ──────────────────────────────────────────────
      - name: 🔨 Build Release APK
        run: flutter build apk --release

      # ──────────────────────────────────────────────
      # 7. Upload artifact sebagai backup
      # ──────────────────────────────────────────────
      - name: 📤 Upload APK sebagai artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: flutter_kasir/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # ──────────────────────────────────────────────
      # 8. Hapus release & tag "latest" sebelumnya
      # ──────────────────────────────────────────────
      - name: 🗑️ Hapus release "latest" sebelumnya
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || \
            echo "ℹ️  Tidak ada release 'latest' sebelumnya, lanjut..."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ──────────────────────────────────────────────
      # 9. Publikasikan APK ke GitHub Release
      # ──────────────────────────────────────────────
      - name: 🚀 Publikasikan ke GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "🚀 PilotPOS — Latest Build"
          body: |
            ## 🤖 Build Otomatis — PilotPOS Android APK

            | Info | Detail |
            |---|---|
            | **Commit** | [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |
            | **Branch** | `${{ github.ref_name }}` |
            | **Workflow** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            ---

            ### 📱 Download

            > **[⬇️ app-release.apk](${{ github.server_url }}/${{ github.repository }}/releases/latest/download/app-release.apk)**

            ---

            ⚠️ *Release ini diperbarui otomatis setiap push ke `main`. Versi sebelumnya akan ditimpa.*
          files: flutter_kasir/build/app/outputs/flutter-apk/app-release.apk
          fail_on_unmatched_files: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
